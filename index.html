<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeRoad Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f4; text-align: center; }
        #auth-ui, #map-ui { padding: 20px; }
        #map { height: 500px; width: 100%; border-radius: 10px; margin-top: 10px; }
        .hidden { display: none; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 5px; border: none; background: #007bff; color: white; margin: 5px; }
        .admin-btn { background: #dc3545; color: white; padding: 5px; border-radius: 3px; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-ui">
        <h3>تسجيل الدخول في SafeRoad</h3>
        <input type="tel" id="phone" placeholder="+967xxxxxxxxx" style="padding: 10px; width: 80%; max-width: 300px;">
        <div id="recaptcha-container"></div>
        <br>
        <button id="send-otp">إرسال كود التحقق</button>
        <div id="otp-area" class="hidden">
            <input type="text" id="otp-code" placeholder="أدخل كود التفعيل" style="padding: 10px; margin-top: 10px;">
            <br>
            <button id="verify-otp" style="margin-top: 10px; background: #28a745;">تأكيد الدخول</button>
        </div>
    </div>

    <div id="map-ui" class="hidden">
        <h3>خريطة SafeRoad</h3>
        <div id="map"></div>
        <button id="report-btn" style="background:#28a745; margin-top: 15px;">🚨 إبلاغ عن حادث/عائق</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDwFAzkfJ1-67tuUkGPk7RJno1JJsHAfJc",
            authDomain: "saferoad-dc91b.firebaseapp.com",
            projectId: "saferoad-dc91b",
            storageBucket: "saferoad-dc91b.firebasestorage.app",
            messagingSenderId: "422753487233",
            appId: "1:422753487233:web:6ea75b9918366bc8e04080"
        };
        firebase.initializeApp(firebaseConfig);
        
        const auth = firebase.auth();
        const db = firebase.firestore();
        const ADMIN_PHONE = "+967771349957"; 
        
        let localReports = []; 
        const lastAlertedTimes = new Map();

        window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { 'size': 'invisible' });

        document.getElementById('send-otp').onclick = () => {
            auth.signInWithPhoneNumber(document.getElementById('phone').value, window.recaptchaVerifier)
            .then(confirmationResult => {
                window.confirmationResult = confirmationResult;
                document.getElementById('otp-area').classList.remove('hidden');
                alert("تم إرسال الكود!");
            }).catch(e => alert("خطأ: " + e.message));
        };

        document.getElementById('verify-otp').onclick = () => {
            window.confirmationResult.confirm(document.getElementById('otp-code').value)
            .then(() => location.reload())
            .catch(() => alert("كود خاطئ!"));
        };

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-ui').classList.add('hidden');
                document.getElementById('map-ui').classList.remove('hidden');
                initMap(user.phoneNumber);
            }
        });

        function initMap(userPhone) {
            const map = L.map('map').setView([15.3694, 44.1910], 12);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png').addTo(map);

            db.collection("reports").onSnapshot(snap => {
                localReports = [];
                snap.forEach(doc => {
                    const data = doc.data();
                    localReports.push({ id: doc.id, ...data });
                    const marker = L.marker([data.location.latitude, data.location.longitude]).addTo(map);
                    if (userPhone === ADMIN_PHONE) {
                        marker.bindPopup(`<b>${data.type}</b><br><button class="admin-btn" onclick="deleteReport('${doc.id}')">حذف</button>`);
                    }
                });
            });

            document.getElementById('report-btn').onclick = () => {
                navigator.geolocation.getCurrentPosition(pos => {
                    db.collection("reports").add({
                        type: "حادث/عائق",
                        location: { latitude: pos.coords.latitude, longitude: pos.coords.longitude },
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    }).then(() => alert("تم الإبلاغ!"));
                });
            };

            navigator.geolocation.watchPosition(pos => {
                const lat = pos.coords.latitude, lng = pos.coords.longitude, now = Date.now();
                localReports.forEach(r => {
                    const dist = Math.sqrt(Math.pow(r.location.latitude-lat, 2) + Math.pow(r.location.longitude-lng, 2)) * 111000;
                    if (dist < 500 && (now - (lastAlertedTimes.get(r.id) || 0) > 300000)) {
                        lastAlertedTimes.set(r.id, now);
                        new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg').play();
                        alert("⚠️ تحذير: عائق قريب!");
                    }
                });
            }, null, { enableHighAccuracy: true });
        }

        window.deleteReport = (id) => {
            if(confirm("حذف؟")) db.collection("reports").doc(id).delete().then(() => location.reload());
        };
    </script>
</body>
</html>
