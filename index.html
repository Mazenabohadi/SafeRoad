<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام SafeRoad</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        .control-panel { padding: 15px; text-align: center; background: #f8f9fa; }
        #report-btn { background-color: #dc3545; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-size: 16px; width: 100%; cursor: pointer; }
        #map { height: 600px; width: 100%; z-index: 1; }
    </style>
</head>
<body>

    <div class="control-panel">
        <strong>SafeRoad</strong>
        <button id="report-btn">🚨 إبلاغ عن حادث</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AizaSyDwFazkFJ-67tuUkGFK7Rjno1jJsHAFJc",
            authDomain: "saferoad-dc91b.firebaseapp.com",
            projectId: "saferoad-dc91b",
            storageBucket: "saferoad-dc91b.appspot.com",
            messagingSenderId: "422753487233",
            appId: "1:422753487233:web:6ea75b9918366bc8e04080"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const map = L.map('map').setView([15.3694, 44.1910], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png', { attribution: '© CartoDB' }).addTo(map);
                                                                                                                       

        const oneDayAgo = new Date(Date.now() - 24 * 60 * 60 * 1000);
        const q = query(collection(db, "reports"), where("timestamp", ">=", oneDayAgo));

        onSnapshot(q, (snapshot) => {
            map.eachLayer((layer) => { if (layer instanceof L.Marker) map.removeLayer(layer); });
            snapshot.forEach((doc) => {
                const data = doc.data();
                if (data.location) {
                    L.marker([data.location.latitude, data.location.longitude]).addTo(map).bindPopup(`نوع البلاغ: ${data.type}`);
                }
            });
        });

        document.getElementById("report-btn").addEventListener("click", () => {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                await addDoc(collection(db, "reports"), {
                    type: "حادث",
                    location: { latitude: pos.coords.latitude, longitude: pos.coords.longitude },
                    timestamp: serverTimestamp()
                });
                alert("تم الإرسال!");
            });
        });
    </script>
</body>
</html>
