<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeRoad - النظام الذكي</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #f4f4f4; }
        .control-panel { padding: 15px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #report-btn { background-color: #dc3545; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-size: 16px; cursor: pointer; margin-top: 10px; }
        #map { height: 400px; width: 100%; z-index: 1; }
        .report-list { padding: 15px; }
        .report-card { background: white; padding: 10px; margin-bottom: 10px; border-radius: 8px; border-right: 5px solid #dc3545; }
    </style>
</head>
<body>

    <div class="control-panel">
        <strong>SafeRoad - لوحة التحكم</strong>
        <input type="file" id="image-input" accept="image/*" style="display:block; margin: 10px 0;">
        <button id="report-btn">🚨 إبلاغ عن حادث/عائق</button>
    </div>

    <div id="map"></div>

    <div class="report-list">
        <h3>بلاغات هذا اليوم (<span id="today-date"></span>)</h3>
        <div id="reports-container"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AizaSyDwFazkFJ-67tuUkGFK7Rjno1jJsHAFJc",
            authDomain: "saferoad-dc91b.firebaseapp.com",
            projectId: "saferoad-dc91b",
            storageBucket: "saferoad-dc91b.appspot.com",
            messagingSenderId: "422753487233",
            appId: "1:422753487233:web:6ea75b9918366bc8e04080"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // إعداد الخريطة
        const map = L.map('map').setView([15.3694, 44.1910], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png').addTo(map);

        // عرض التاريخ
        document.getElementById("today-date").innerText = new Date().toLocaleDateString();

        // الاستماع للبلاغات
        const q = query(collection(db, "reports"), where("timestamp", ">=", new Date(Date.now() - 24 * 60 * 60 * 1000)));

        onSnapshot(q, async (snapshot) => {
            const container = document.getElementById("reports-container");
            container.innerHTML = "";
            
            // تنظيف الخريطة
            map.eachLayer((layer) => { if (layer instanceof L.Marker) map.removeLayer(layer); });

            for (const doc of snapshot.docs) {
                const data = doc.data();
                if (data.location) {
                    L.marker([data.location.latitude, data.location.longitude]).addTo(map).bindPopup(data.type);
                    
                    // جلب الموقع واسم المنطقة
                    const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${data.location.latitude}&lon=${data.location.longitude}`);
                    const addr = await response.json();
                    
                    const div = document.createElement("div");
                    div.className = "report-card";
                    div.innerHTML = `
                        <strong>${addr.display_name ? addr.display_name.split(',')[0] : "موقع غير معروف"}</strong><br>
                        الوقت: ${data.timestamp ? data.timestamp.toDate().toLocaleTimeString() : "الآن"}<br>
                        <a href="${data.imageUrl}" target="_blank">رؤية موقع البلاغ (الصورة)</a>
                    `;
                    container.appendChild(div);
                }
            }
        });

        // زر الإبلاغ
        document.getElementById("report-btn").addEventListener("click", () => {
            const fileInput = document.getElementById("image-input");
            if (!fileInput.files[0]) return alert("يرجى اختيار صورة!");
            
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const file = fileInput.files[0];
                const storageRef = ref(storage, 'reports/' + Date.now());
                await uploadBytes(storageRef, file);
                const imageUrl = await getDownloadURL(storageRef);

                await addDoc(collection(db, "reports"), {
                    type: "حادث",
                    location: { latitude: pos.coords.latitude, longitude: pos.coords.longitude },
                    timestamp: serverTimestamp(),
                    imageUrl: imageUrl
                });
                alert("تم إرسال البلاغ بنجاح!");
            });
        });
    </script>
</body>
</html>
