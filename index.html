<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SafeRoad - لوحة التحكم</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        body { font-family: sans-serif; padding: 10px; }
        #map { height: 400px; width: 100%; border-radius: 10px; margin-top: 10px; }
        .control-box { padding: 15px; background: #f4f4f4; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="control-box">
        <h2>نظام SafeRoad</h2>
        <button id="report-btn" style="padding: 10px 20px; font-size: 16px;">🚨 إبلاغ عن حادث/عائق</button>
    </div>

    <div id="map"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // *** يجب تعبئة بيانات Firebase الخاصة بك هنا ***
        const firebaseConfig = {  apiKey: "AIzaSyDwFAzkfJ1-67tuUkGPk7RJno1JJsHAfJc",
  authDomain: "saferoad-dc91b.firebaseapp.com",
  projectId: "saferoad-dc91b",
  storageBucket: "saferoad-dc91b.firebasestorage.app",
  messagingSenderId: "422753487233",
  appId: "1:422753487233:web:6ea75b9918366bc8e04080"};

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 1. تهيئة الخريطة (مركزها صنعاء كمثال)
        const map = L.map('map').setView([15.3694, 44.1910], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // 2. قراءة البلاغات ووضعها على الخريطة
        onSnapshot(collection(db, "reports"), (snapshot) => {
            snapshot.forEach((doc) => {
                const data = doc.data();
                if(data.location) {
                    L.marker([data.location.latitude, data.location.longitude])
                     .addTo(map)
                     .bindPopup(`نوع البلاغ: ${data.type}`);
                }
            });
        });

        // 3. وظيفة زر الإبلاغ
        document.getElementById("report-btn").addEventListener("click", () => {
            navigator.geolocation.getCurrentPosition(async (position) => {
                const { latitude, longitude } = position.coords;
                await addDoc(collection(db, "reports"), {
                    type: "حادث",
                    location: { latitude, longitude },
                    timestamp: serverTimestamp()
                });
                alert("تم إرسال البلاغ بنجاح!");
            });
        });
    </script>
</body>
</html>
