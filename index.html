<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeRoad Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f4; text-align: center; }
        #auth-ui, #main-ui { padding: 20px; }
        #map { height: 400px; width: 100%; border-radius: 10px; margin-bottom: 20px; }
        #reports-list { background: white; padding: 15px; border-radius: 10px; text-align: right; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 5px; border: none; background: #4285f4; color: white; }
        .admin-btn { background: #dc3545; color: white; padding: 5px; border-radius: 3px; border: none; margin-top: 5px; }
        .comment-item { border-bottom: 1px solid #eee; padding: 5px 0; font-size: 13px; color: #555; }
        .report-item { margin-bottom: 10px; padding: 8px; border-right: 4px solid #4285f4; background: #f9f9f9; }
    </style>
</head>
<body>

    <div id="auth-ui">
        <h3>مرحباً بك في SafeRoad Pro</h3>
        <button id="google-login">تسجيل الدخول عبر Google</button>
    </div>

    <div id="main-ui" class="hidden">
        <h3>خريطة البلاغات</h3>
        <div id="map"></div>
        <button id="report-btn" style="background:#28a745;">🚨 إبلاغ عن حادث/عائق جديد</button>
        
        <div id="reports-list" style="margin-top:20px;">
            <h4>قائمة البلاغات النشطة (آخر 24 ساعة):</h4>
            <div id="list-content"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDwFAzkfJ1-67tuUkGPk7RJno1JJsHAfJc",
            authDomain: "saferoad-dc91b.firebaseapp.com",
            projectId: "saferoad-dc91b",
            storageBucket: "saferoad-dc91b.firebasestorage.app",
            messagingSenderId: "422753487233",
            appId: "1:422753487233:web:6ea75b9918366bc8e04080"
        };
        firebase.initializeApp(firebaseConfig);
        
        const auth = firebase.auth();
        const db = firebase.firestore();
        const ADMIN_EMAIL = "mazenabuhadi3@gmail.com";
        const lastAlertedTimes = new Map();

        document.getElementById('google-login').onclick = () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider);
        };

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-ui').classList.add('hidden');
                document.getElementById('main-ui').classList.remove('hidden');
                initApp(user.email);
            }
        });

        function initApp(userEmail) {
            const map = L.map('map').setView([15.3694, 44.1910], 12);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png').addTo(map);

            db.collection("reports").onSnapshot(snap => {
                const listContent = document.getElementById('list-content');
                listContent.innerHTML = "";
                const now = Date.now();
                const oneDay = 24 * 60 * 60 * 1000;

                snap.forEach(doc => {
                    const data = doc.data();
                    const timestamp = data.timestamp ? data.timestamp.toMillis() : 0;

                    if (now - timestamp > oneDay) return;

                    const marker = L.marker([data.location.latitude, data.location.longitude]).addTo(map);
                    let popupContent = `<b>${data.type}</b><br>`;
                    
                    if(data.comments) {
                        data.comments.forEach(c => popupContent += `<div class="comment-item">• ${c}</div>`);
                    }
                    popupContent += `<br><input type="text" id="comm-${doc.id}" placeholder="أضف تعليق..."> <button onclick="addComment('${doc.id}')">إرسال</button>`;
                    
                    if (userEmail === ADMIN_EMAIL) {
                        popupContent += `<br><button class="admin-btn" onclick="deleteReport('${doc.id}')">حذف البلاغ</button>`;
                    }
                    marker.bindPopup(popupContent);

                    listContent.innerHTML += `<div class="report-item">📍 ${data.type} - ${new Date(timestamp).toLocaleTimeString()}</div>`;

                    navigator.geolocation.getCurrentPosition(pos => {
                        const dist = Math.sqrt(Math.pow(data.location.latitude-pos.coords.latitude, 2) + Math.pow(data.location.longitude-pos.coords.longitude, 2)) * 111000;
                        if (dist < 500 && (now - (lastAlertedTimes.get(doc.id) || 0) > 300000)) {
                            lastAlertedTimes.set(doc.id, now);
                            alert("⚠️ تحذير: عائق قريب منك!");
                        }
                    });
                });
            });
        }

        document.getElementById('report-btn').onclick = () => {
            navigator.geolocation.getCurrentPosition(pos => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                const today = new Date().toISOString().split('T')[0];

                db.collection("reports").get().then(snap => {
                    let isDuplicate = false;
                    snap.forEach(doc => {
                        const d = doc.data();
                        const dDate = d.timestamp.toDate().toISOString().split('T')[0];
                        const dist = Math.sqrt(Math.pow(d.location.latitude-lat, 2) + Math.pow(d.location.longitude-lng, 2)) * 111000;
                        if (dDate === today && dist < 50) isDuplicate = true;
                    });

                    if (isDuplicate) {
                        alert("تم الإبلاغ مسبقاً في هذا المكان اليوم!");
                    } else {
                        db.collection("reports").add({
                            type: "حادث/عائق",
                            location: { latitude: lat, longitude: lng },
                            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                            comments: []
                        }).then(() => alert("تم الإبلاغ بنجاح!"));
                    }
                });
            });
        };

        window.addComment = (id) => {
            const comment = document.getElementById(`comm-${id}`).value;
            if(!comment) return;
            db.collection("reports").doc(id).update({
                comments: firebase.firestore.FieldValue.arrayUnion(comment)
            }).then(() => alert("تمت إضافة التعليق!"));
        };

        window.deleteReport = (id) => {
            if(confirm("حذف؟")) db.collection("reports").doc(id).delete().then(() => location.reload());
        };
    </script>
</body>
</html>
