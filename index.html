<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طريق آمن</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 h-screen flex flex-col justify-center items-center p-4">

    <!-- واجهة التطبيق -->
    <div class="bg-gray-800 p-6 rounded-[2rem] shadow-2xl w-full max-w-md border border-gray-700">
        <div class="text-center mb-8 relative">
            <div class="w-20 h-20 bg-gray-700 rounded-full mx-auto flex items-center justify-center mb-4 shadow-inner">
                <i class="fa-solid fa-shield text-green-400 text-4xl drop-shadow-[0_0_10px_rgba(74,222,128,0.5)]"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-white tracking-wide">طريق آمن</h1>
            <p class="text-gray-400 text-sm mt-1">الرادار المجتمعي الذكي</p>
        </div>

        <button id="btnAccident" class="w-full bg-gradient-to-r from-red-600 to-red-500 hover:from-red-500 hover:to-red-400 text-white font-bold py-4 px-4 rounded-xl mb-4 shadow-[0_4px_15px_rgba(220,38,38,0.4)] flex justify-center items-center gap-3 text-lg transition-all active:scale-95">
            <i class="fa-solid fa-car-burst text-2xl"></i>
            إبلاغ عن حادث
        </button>

        <button id="btnTraffic" class="w-full bg-gradient-to-r from-orange-500 to-yellow-500 hover:from-orange-400 hover:to-yellow-400 text-white font-bold py-4 px-4 rounded-xl shadow-[0_4px_15px_rgba(245,158,11,0.4)] flex justify-center items-center gap-3 text-lg transition-all active:scale-95">
            <i class="fa-solid fa-traffic-light text-2xl"></i>
            إبلاغ عن زحام / إغلاق
        </button>

        <!-- رسالة الحالة -->
        <div id="statusMessage" class="mt-6 p-4 text-center font-bold hidden rounded-xl transition-all duration-300"></div>
    </div>

    <!-- أكواد الربط مع قاعدة بيانات Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // مفاتيحك الخاصة التي استخرجتها
        const firebaseConfig = {
          apiKey: "AIzaSyDwFAzkfJ1-67tuUkGPk7RJno1JJsHAfJc",
          authDomain: "saferoad-dc91b.firebaseapp.com",
          projectId: "saferoad-dc91b",
          storageBucket: "saferoad-dc91b.firebasestorage.app",
          messagingSenderId: "422753487233",
          appId: "1:422753487233:web:6ea75b9918366bc8e04080"
        };

        // تهيئة التطبيق وقاعدة البيانات
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const statusDiv = document.getElementById('statusMessage');

        // دالة الإبلاغ وإرسال الإحداثيات
        function handleReport(type) {
            statusDiv.classList.remove('hidden');
            statusDiv.className = "mt-6 p-4 bg-gray-700 text-blue-400 rounded-xl text-center font-bold border border-gray-600";
            statusDiv.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري تحديد الموقع وإرسال البلاغ...';

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;

                    try {
                        // إرسال البيانات إلى Firestore
                        await addDoc(collection(db, "reports"), {
                            type: type,
                            location: {
                                latitude: lat,
                                longitude: lng
                            },
                            timestamp: serverTimestamp()
                        });
                        statusDiv.className = "mt-6 p-4 bg-gray-700 text-green-400 rounded-xl text-center font-bold border border-green-500/30";
                        statusDiv.innerHTML = "✅ تم إرسال البلاغ وحفظه في السحابة بنجاح!";
                    } catch (e) {
                        console.error("Error adding document: ", e);
                        statusDiv.className = "mt-6 p-4 bg-gray-700 text-red-400 rounded-xl text-center font-bold border border-red-500/30";
                        statusDiv.innerHTML = "❌ حدث خطأ، تأكد من تفعيل Firestore في وضع الاختبار.";
                    }
                }, (error) => {
                    statusDiv.className = "mt-6 p-4 bg-gray-700 text-red-400 rounded-xl text-center font-bold border border-red-500/30";
                    statusDiv.innerHTML = "❌ يرجى تفعيل الـ GPS في هاتفك لتحديد موقعك.";
                });
            } else {
                statusDiv.className = "mt-6 p-4 bg-gray-700 text-red-400 rounded-xl text-center font-bold border border-red-500/30";
                statusDiv.innerHTML = "❌ متصفحك لا يدعم تقنية الموقع الجغرافي.";
            }
        }

        // تفعيل الأزرار
        document.getElementById('btnAccident').addEventListener('click', () => handleReport('حادث'));
        document.getElementById('btnTraffic').addEventListener('click', () => handleReport('زحام'));
    </script>
</body>
</html>
